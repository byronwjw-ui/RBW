<style>

.deck-shell{position:fixed;inset:0;display:flex;flex-direction:column}

<script>
/* ============================================================
   PASSWORD CONFIGURATION
   Generate hashes in browser console:
     await sha256("your-password")
   Default passwords (CHANGE BEFORE DEPLOY):
     Investor: "investor2025"
     Full:     "full2025"
   ============================================================ */
const PASSWORD_SALT = "RBW-2025-confidential";
const PASSWORD_HASH_INVESTOR = "8e9d2c5f3a4b7c8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e"; // PLACEHOLDER · sha256("investor2025"+salt)
const PASSWORD_HASH_FULL     = "1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b"; // PLACEHOLDER · sha256("full2025"+salt)

async function sha256(text){
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
window.sha256 = sha256; // expose for console use

(function(){
const TIER_RANK = {public:0, investor:1, full:2};
const host = document.getElementById('slides-injection-point');
const parent = host.parentNode;
const pgCur=document.getElementById('pg-cur');
const pgTotal=document.getElementById('pg-total');
const secInd=document.getElementById('section-ind');
const bar=document.getElementById('progress-bar');
const tocWrap=document.getElementById('toc');
const tocGrid=document.getElementById('toc-grid');
const pwdModal=document.getElementById('pwd-modal');
const pwdInput=document.getElementById('pwd-input');
const pwdErr=document.getElementById('pwd-err');
const pwdTitle=document.getElementById('pwd-title');
const pwdSub=document.getElementById('pwd-sub');

let i=0, slides=[], total=0;
let pendingTier=null;

function currentTier(){ return document.body.getAttribute('data-tier')||'public'; }
function isUnlocked(t){
  if(t==='public') return true;
  if(t==='investor') return sessionStorage.getItem('rbw_unlocked_investor')==='true';
  if(t==='full') return sessionStorage.getItem('rbw_unlocked_full')==='true';
  return false;
}

function updateTierButtons(){
  ['public','investor','full'].forEach(function(t){
    var el=document.getElementById('tier-'+t);
    if(!el) return;
    el.classList.toggle('active', currentTier()===t);
    if(t==='public'){ el.classList.remove('locked','unlocked'); }
    else {
      el.classList.toggle('locked', !isUnlocked(t));
      el.classList.toggle('unlocked', isUnlocked(t) && currentTier()!==t);
    }
  });
}

function render(){
  parent.querySelectorAll('.slide').forEach(function(s){ s.remove(); });
  var lang = document.body.getAttribute('data-lang');
  var head = (lang==='zh' ? window.RBW_SLIDES_ZH_HEAD : window.RBW_SLIDES_EN_HEAD) || [];
  var tail = (lang==='zh' ? window.RBW_SLIDES_ZH : window.RBW_SLIDES) || [];
  var payload = head.concat(tail).join('\n');
  var tmp = document.createElement('div');
  tmp.innerHTML = payload;
  // tier filtering
  var tier = currentTier();
  var rank = TIER_RANK[tier];
  Array.from(tmp.querySelectorAll('.slide')).forEach(function(s){
    var minTier = s.getAttribute('data-min-tier');
    var only = s.getAttribute('data-tier-only');
    var keep = true;
    if(only && only !== tier) keep = false;
    if(minTier && TIER_RANK[minTier] > rank) keep = false;
    if(!keep) s.remove();
  });
  while(tmp.firstChild){ parent.insertBefore(tmp.firstChild, host); }
  // also filter nested blocks (data-min-tier within slides)
  parent.querySelectorAll('[data-min-tier]').forEach(function(el){
    if(el.classList.contains('slide')) return; // already handled
    var mt = el.getAttribute('data-min-tier');
    if(TIER_RANK[mt] > rank) el.style.display='none';
    else el.style.display='';
  });
  wireSlides();
}

function paint(){
  slides.forEach((s,idx)=>s.classList.toggle('active',idx===i));
  pgCur.textContent=String(i+1).padStart(2,'0');
  const s=slides[i];if(!s)return;
  const t=s.getAttribute('data-title')||'';
  const sec=s.getAttribute('data-section')||'';
  secInd.textContent=(sec?sec+' · ':'')+t;
  bar.style.width=((i+1)/total*100).toFixed(2)+'%';
  const meta=s.querySelector('.slide-meta .pgnum');
  if(meta)meta.textContent=String(i+1).padStart(2,'0')+' / '+String(total).padStart(2,'0');
}
function go(n){i=Math.max(0,Math.min(total-1,n));paint();}
function next(){go(i+1)}function prev(){go(i-1)}

function wireSlides(){
  slides = Array.from(document.querySelectorAll('.slide'));
  total = slides.length;
  pgTotal.textContent=String(total).padStart(2,'0');
  i = Math.min(i, total-1);
  if(i<0) i=0;
  tocGrid.innerHTML='';
  slides.forEach((s,idx)=>{
    const a=document.createElement('a');
    a.innerHTML='<span class="n">'+String(idx+1).padStart(2,'0')+'</span><span class="t">'+(s.getAttribute('data-title')||'')+'</span><span class="s">'+(s.getAttribute('data-section')||'')+'</span>';
    a.addEventListener('click',()=>{go(idx);tocWrap.classList.remove('open');});
    tocGrid.appendChild(a);
  });
  // wire unlock buttons inside slides
  parent.querySelectorAll('[data-unlock]').forEach(function(btn){
    btn.addEventListener('click', function(){ requestUnlock(btn.getAttribute('data-unlock')); });
  });
  paint();
}

function setTier(t){
  if(!isUnlocked(t)){ requestUnlock(t); return; }
  document.body.setAttribute('data-tier', t);
  i = 0;
  updateTierButtons();
  render();
}

function requestUnlock(t){
  if(t==='public'){ setTier('public'); return; }
  if(isUnlocked(t)){ setTier(t); return; }
  pendingTier = t;
  pwdInput.value='';
  pwdErr.textContent='';
  if(t==='investor'){
    pwdTitle.textContent = document.body.getAttribute('data-lang')==='zh' ? '解锁 Investor 版' : 'Unlock Investor View';
    pwdSub.textContent = document.body.getAttribute('data-lang')==='zh' ? '输入 Investor 密码以解锁 28 页投资人版本。' : 'Enter Investor password to unlock the 28-page investor view.';
  } else if(t==='full'){
    pwdTitle.textContent = document.body.getAttribute('data-lang')==='zh' ? '解锁完整版 (Full Access)' : 'Unlock Full Access · 完整版';
    pwdSub.textContent = document.body.getAttribute('data-lang')==='zh' ? '输入完整版密码以解锁全部 43 页内容。' : 'Enter Full Access password to unlock all 43 pages.';
  }
  pwdModal.classList.add('open');
  setTimeout(function(){ pwdInput.focus(); }, 50);
}

async function attemptUnlock(){
  if(!pendingTier) return;
  const val = pwdInput.value;
  if(!val){ pwdErr.textContent = document.body.getAttribute('data-lang')==='zh' ? '请输入密码' : 'Password required'; return; }
  const h = await sha256(val + PASSWORD_SALT);
  const target = pendingTier==='investor' ? PASSWORD_HASH_INVESTOR : PASSWORD_HASH_FULL;
  if(h === target){
    sessionStorage.setItem('rbw_unlocked_'+pendingTier, 'true');
    pwdModal.classList.remove('open');
    setTier(pendingTier);
    pendingTier = null;
  } else {
    pwdErr.textContent = document.body.getAttribute('data-lang')==='zh' ? '密码错误，请重试。' : 'Incorrect password. Try again.';
    pwdInput.select();
  }
}

document.getElementById('pwd-submit').addEventListener('click', attemptUnlock);
document.getElementById('pwd-cancel').addEventListener('click', function(){ pwdModal.classList.remove('open'); pendingTier=null; });
pwdInput.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); attemptUnlock(); } });
pwdModal.addEventListener('click', function(e){ if(e.target===pwdModal){ pwdModal.classList.remove('open'); pendingTier=null; }});

document.getElementById('btn-next').addEventListener('click',next);
document.getElementById('btn-prev').addEventListener('click',prev);
document.getElementById('btn-print').addEventListener('click',()=>window.print());
document.getElementById('btn-toc').addEventListener('click',()=>tocWrap.classList.add('open'));
document.getElementById('btn-toc-close').addEventListener('click',()=>tocWrap.classList.remove('open'));
document.getElementById('tier-public').addEventListener('click',()=>setTier('public'));
document.getElementById('tier-investor').addEventListener('click',()=>setTier('investor'));
document.getElementById('tier-full').addEventListener('click',()=>setTier('full'));

function setLang(l){
  document.body.setAttribute('data-lang',l);
  document.documentElement.setAttribute('lang',l==='zh'?'zh':'en');
  document.getElementById('lang-en').classList.toggle('active',l==='en');
  document.getElementById('lang-zh').classList.toggle('active',l==='zh');
  render();
}
document.getElementById('lang-en').addEventListener('click',()=>setLang('en'));
document.getElementById('lang-zh').addEventListener('click',()=>setLang('zh'));

document.addEventListener('keydown',(e)=>{
  if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'))return;
  if(pwdModal.classList.contains('open')){
    if(e.key==='Escape'){ pwdModal.classList.remove('open'); pendingTier=null; }
    return;
  }
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);}else if(e.key==='End'){go(total-1);}
  else if(e.key.toLowerCase()==='t'){tocWrap.classList.toggle('open');}
  else if(e.key==='Escape'){tocWrap.classList.remove('open');}
  else if(e.key.toLowerCase()==='p'){window.print();}
  else if(e.key.toLowerCase()==='i'){
    const order=['public','investor','full'];
    const cur=currentTier();
    let idx=(order.indexOf(cur)+1)%order.length;
    // skip locked tiers
    let safety=0;
    while(!isUnlocked(order[idx]) && safety<3){ idx=(idx+1)%order.length; safety++; }
    if(isUnlocked(order[idx])) setTier(order[idx]);
  }
  else if(e.key.toLowerCase()==='l'){const l=document.body.getAttribute('data-lang')==='zh'?'en':'zh';setLang(l);}
});

document.querySelector('.stage').addEventListener('click',(e)=>{
  if(!e.target.closest('.slide'))return;
  if(e.target.closest('a,button'))return;
  const ac=document.querySelector('.slide.active');if(!ac)return;
  const r=ac.getBoundingClientRect();const x=e.clientX-r.left;
  if(x>r.width*0.66)next();else if(x<r.width*0.18)prev();
});

let tx=null;
document.querySelector('.stage').addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
document.querySelector('.stage').addEventListener('touchend',e=>{if(tx==null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40){dx<0?next():prev();}tx=null;},{passive:true});

updateTierButtons();
render();
})();
</script></body></html>
