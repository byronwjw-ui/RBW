<script src="slides2.js"></script>

<script src="slides2_zh.js"></script>
<script>
(function(){
var host = document.getElementById('slides-injection-point');
var parent = host.parentNode;
function render(){
  parent.querySelectorAll('.slide').forEach(function(s){ s.remove(); });
  var lang = document.body.getAttribute('data-lang');
  var head = (lang==='zh' ? window.RBW_SLIDES_ZH_HEAD : window.RBW_SLIDES_EN_HEAD) || [];
  var tail = (lang==='zh' ? window.RBW_SLIDES_ZH : window.RBW_SLIDES) || [];
  var payload = head.concat(tail).join('\n');
  var tmp = document.createElement('div');
  tmp.innerHTML = payload;
  while(tmp.firstChild){ parent.insertBefore(tmp.firstChild, host); }
  wireSlides();
}

let i=0, slides=[], total=0;
const pgCur=document.getElementById('pg-cur');
const pgTotal=document.getElementById('pg-total');
const secInd=document.getElementById('section-ind');
const bar=document.getElementById('progress-bar');
const tocWrap=document.getElementById('toc');
const tocGrid=document.getElementById('toc-grid');

function paint(){
  slides.forEach((s,idx)=>s.classList.toggle('active',idx===i));
  pgCur.textContent=String(i+1).padStart(2,'0');
  const s=slides[i];if(!s)return;
  const t=s.getAttribute('data-title')||'';
  const sec=s.getAttribute('data-section')||'';
  secInd.textContent=(sec?sec+' · ':'')+t;
  bar.style.width=((i+1)/total*100).toFixed(2)+'%';
  const meta=s.querySelector('.slide-meta .pgnum');
  if(meta)meta.textContent=String(i+1).padStart(2,'0')+' / '+String(total).padStart(2,'0');
}
function go(n){i=Math.max(0,Math.min(total-1,n));paint();}
function next(){go(i+1)}function prev(){go(i-1)}

function wireSlides(){
  slides = Array.from(document.querySelectorAll('.slide'));
  total = slides.length;
  pgTotal.textContent=String(total).padStart(2,'0');
  i = Math.min(i, total-1);
  tocGrid.innerHTML='';
  slides.forEach((s,idx)=>{
    const a=document.createElement('a');
    a.innerHTML='<span class="n">'+String(idx+1).padStart(2,'0')+'</span><span class="t">'+(s.getAttribute('data-title')||'')+'</span><span class="s">'+(s.getAttribute('data-section')||'')+'</span>';
    a.addEventListener('click',()=>{go(idx);tocWrap.classList.remove('open');});
    tocGrid.appendChild(a);
  });
  paint();
}

document.getElementById('btn-next').addEventListener('click',next);
document.getElementById('btn-prev').addEventListener('click',prev);
document.getElementById('btn-print').addEventListener('click',()=>window.print());
document.getElementById('btn-toc').addEventListener('click',()=>tocWrap.classList.add('open'));
document.getElementById('btn-toc-close').addEventListener('click',()=>tocWrap.classList.remove('open'));

document.addEventListener('keydown',(e)=>{
  if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'))return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);}else if(e.key==='End'){go(total-1);}
  else if(e.key.toLowerCase()==='t'){tocWrap.classList.toggle('open');}
  else if(e.key==='Escape'){tocWrap.classList.remove('open');}
  else if(e.key.toLowerCase()==='p'){window.print();}
  else if(e.key.toLowerCase()==='i'){const m=document.body.getAttribute('data-mode')==='internal'?'investor':'internal';setMode(m);}
  else if(e.key.toLowerCase()==='l'){const l=document.body.getAttribute('data-lang')==='zh'?'en':'zh';setLang(l);}
});

document.querySelector('.stage').addEventListener('click',(e)=>{
  if(!e.target.closest('.slide'))return;
  if(e.target.closest('a,button'))return;
  const ac=document.querySelector('.slide.active');if(!ac)return;
  const r=ac.getBoundingClientRect();const x=e.clientX-r.left;
  if(x>r.width*0.66)next();else if(x<r.width*0.18)prev();
});

function setMode(m){
  document.body.setAttribute('data-mode',m);
  document.getElementById('mode-investor').classList.toggle('active',m==='investor');
  document.getElementById('mode-internal').classList.toggle('active',m==='internal');
}
function setLang(l){
  document.body.setAttribute('data-lang',l);
  document.documentElement.setAttribute('lang',l==='zh'?'zh':'en');
  document.getElementById('lang-en').classList.toggle('active',l==='en');
  document.getElementById('lang-zh').classList.toggle('active',l==='zh');
  render();
}
document.getElementById('mode-investor').addEventListener('click',()=>setMode('investor'));
document.getElementById('mode-internal').addEventListener('click',()=>setMode('internal'));
document.getElementById('lang-en').addEventListener('click',()=>setLang('en'));
document.getElementById('lang-zh').addEventListener('click',()=>setLang('zh'));

let tx=null;
document.querySelector('.stage').addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
document.querySelector('.stage').addEventListener('touchend',e=>{if(tx==null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40){dx<0?next():prev();}tx=null;},{passive:true});

render();
})();
</script></body></html>
